name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint PHP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check — todos os arquivos PHP do tema
        run: |
          find wp-content/themes/guiaantifraude -name "*.php" -print0 \
            | xargs -0 -n1 php -l

      - name: Inline styles excessivos
        run: |
          count=$(grep -rn 'style=' wp-content/themes/guiaantifraude --include="*.php" | wc -l)
          echo "Inline styles: $count"
          if [ "$count" -gt 10 ]; then
            echo "::warning::$count inline styles — considere mover para style.css"
          fi

  deploy:
    name: Deploy (zero downtime)
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

    steps:
      - uses: actions/checkout@v4

      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.DEPLOY_HOST_KEY }}" >> ~/.ssh/known_hosts

      - name: Empacotar tema
        run: tar czf /tmp/guiaantifraude-theme.tar.gz -C wp-content/themes guiaantifraude

      - name: Enviar tema e script para o servidor
        run: |
          scp -i ~/.ssh/deploy_key \
            /tmp/guiaantifraude-theme.tar.gz \
            scripts/deploy-theme.sh \
            ${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/

      - name: Executar deploy no servidor
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${DEPLOY_USER}@${DEPLOY_HOST} \
            "chmod +x /tmp/deploy-theme.sh && /tmp/deploy-theme.sh"

      - name: Verificar site no ar
        run: |
          sleep 3
          status=$(curl -s -o /dev/null -w "%{http_code}" https://guiaantifraude.com)
          echo "HTTP status: $status"
          if [ "$status" != "200" ] && [ "$status" != "301" ] && [ "$status" != "302" ]; then
            echo "::error::Site retornou HTTP $status após deploy"
            exit 1
          fi
          echo "Site OK."
