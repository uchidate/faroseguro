name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint PHP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PHP syntax check
        run: |
          find wp-content/themes/guiaantifraude -name "*.php" -print0 \
            | xargs -0 -n1 php -l

      - name: Check for inline styles in PHP templates
        run: |
          count=$(grep -rn 'style=' wp-content/themes/guiaantifraude --include="*.php" | wc -l)
          echo "Inline styles encontrados: $count"
          if [ "$count" -gt 10 ]; then
            echo "::warning::Muitos inline styles ($count). Considere mover para style.css."
          fi

  deploy:
    name: Deploy via Coolify
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Coolify deploy
        run: |
          response=$(curl -s -o /tmp/coolify_resp.txt -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            "https://coolify.hallyuhub.com.br/api/v1/deploy?uuid=pjn7ad04hr2r75ocaa68yeki")
          echo "Coolify respondeu: $response"
          cat /tmp/coolify_resp.txt
          if [ "$response" != "200" ] && [ "$response" != "201" ]; then
            echo "::error::Deploy falhou. HTTP $response"
            exit 1
          fi
          echo "Deploy disparado com sucesso."
