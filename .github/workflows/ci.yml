name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint PHP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: PHP syntax check
        run: find wp-content/themes/guiaantifraude -name "*.php" -print0 | xargs -0 -n1 php -l

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add known host
        run: echo "${{ secrets.DEPLOY_HOST_KEY }}" >> ~/.ssh/known_hosts

      - name: Deploy
        run: ssh root@31.97.255.107 "bash <(curl -fsSL https://raw.githubusercontent.com/uchidate/faroseguro/main/scripts/deploy-theme.sh)"

      - name: Verificar site
        run: |
          sleep 3
          status=$(curl -s -o /dev/null -w "%{http_code}" https://guiaantifraude.com)
          [ "$status" = "200" ] || [ "$status" = "301" ] || { echo "Site retornou $status"; exit 1; }
          echo "Site OK ($status)"
