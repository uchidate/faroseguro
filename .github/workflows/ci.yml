name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint PHP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PHP syntax check
        run: |
          find wp-content/themes/guiaantifraude -name "*.php" -print0 \
            | xargs -0 -n1 php -l

      - name: Check for inline styles in PHP templates
        run: |
          count=$(grep -rn 'style=' wp-content/themes/guiaantifraude --include="*.php" | wc -l)
          echo "Inline styles encontrados: $count"
          if [ "$count" -gt 10 ]; then
            echo "::warning::Muitos inline styles ($count). Considere mover para style.css."
          fi

  deploy:
    name: Deploy via Coolify
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Coolify deploy
        run: |
          if [ -z "${{ secrets.COOLIFY_WEBHOOK_URL }}" ]; then
            echo "::warning::COOLIFY_WEBHOOK_URL não configurado. Deploy não disparado."
            echo "Configure em: Settings → Secrets → COOLIFY_WEBHOOK_URL"
            exit 0
          fi
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ secrets.COOLIFY_WEBHOOK_URL }}")
          echo "Coolify respondeu: $response"
          if [ "$response" != "200" ] && [ "$response" != "201" ]; then
            echo "::error::Deploy falhou. HTTP $response"
            exit 1
          fi
          echo "Deploy disparado com sucesso."
