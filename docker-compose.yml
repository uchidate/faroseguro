services:
  wordpress:
    build: .
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: guiaantifraude
      WORDPRESS_DB_USER: guiaantifraude
      WORDPRESS_DB_PASSWORD: guiaantifraude
      WORDPRESS_DEBUG: "1"
    volumes:
      - ./wp-content/themes/guiaantifraude:/var/www/html/wp-content/themes/guiaantifraude
      - ./ads.txt:/var/www/html/ads.txt
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: guiaantifraude
      MYSQL_USER: guiaantifraude
      MYSQL_PASSWORD: guiaantifraude
      MYSQL_ROOT_PASSWORD: guiaantifraude_root
    volumes:
      - db_data_guiaantifraude:/var/lib/mysql

volumes:
  db_data_guiaantifraude:
